<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집중 헤드헌팅</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f0f;overflow:hidden;font-family:Pretendard,sans-serif;color:white;}

/* 16:9 */
.screen{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
.canvas{position:relative;width:100%;max-width:1600px;aspect-ratio:16/9;overflow:hidden;}

.bgVideo{position:absolute;width:100%;height:100%;object-fit:cover;z-index:0;}
.leftShade{
position:absolute;height:100%;width:38%;
background:linear-gradient(to right,rgba(0,0,0,0.85),rgba(0,0,0,0));
z-index:1;
}
.uiLayer{position:absolute;width:100%;height:100%;z-index:2;}

/* 배너 */
.pickup{
position:absolute;left:3%;width:22%;
transform:skewX(-12deg);cursor:pointer;transition:0.25s;
}
.pick1{top:12%;}
.pick2{top:28%;}
.pick3{top:42%;}
.pickup div{
background:#111;border:2px solid #333;
padding:6% 8%;font-size:1.3vw;transform:skewX(12deg);
}
.pickup.active{transform:skewX(-12deg) translateX(0.8vw);}
.pickup.active div{border-color:#aaa;box-shadow:0 0 1vw rgba(255,255,255,0.4);}

/* 가챠 버튼 */
.gacha{
position:absolute;right:5%;width:22%;
transform:skewX(-12deg);cursor:pointer;
}
.gacha7{top:36%;}
.gacha8{top:50%;}
.gacha div{
background:#111;border:2px solid #333;
padding:8% 6%;font-size:1.5vw;text-align:center;
transform:skewX(12deg);
}

/* SD */
.sdWrapper{
position:absolute;left:17%;bottom:22%;
width:10%;aspect-ratio:1/1;
display:flex;align-items:center;justify-content:center;
}
.diamond{
position:absolute;width:100%;height:100%;
background:#111;transform:rotate(45deg);z-index:1;
}
.sdChar{
position:absolute;bottom:-10%;
width:170%;height:auto;z-index:2;
}

/* 화살표 */
.arrow{
position:absolute;top:50%;font-size:2vw;
cursor:pointer;z-index:3;user-select:none;
}
#leftArrow{left:42%;}
#rightArrow{right:42%;}

/* 결과 오버레이 */
.resultOverlay{
position:absolute;width:100%;height:100%;
background:rgba(0,0,0,0.9);
z-index:5;display:none;
overflow:auto;padding:4%;
}
.resultCard{
background:#1c1c1c;margin-bottom:10px;
padding:10px;border-radius:6px;
}
.infra{color:red;}
.ultra{color:violet;}
.lumen{color:silver;}
.newMark{color:gold;font-weight:bold;}
.closeBtn{
position:absolute;top:2%;right:3%;
cursor:pointer;font-size:1.5vw;
}

/* 세로 차단 */
.rotateWarning{
position:fixed;top:0;left:0;
width:100%;height:100%;
background:#0f0f0f;display:none;
align-items:center;justify-content:center;
font-size:4vw;z-index:9999;
}
</style>
</head>
<body>

<div class="screen">
<div class="canvas">

<video id="bgVideo" class="bgVideo" muted loop playsinline></video>
<div class="leftShade"></div>

<div class="uiLayer">

<div class="pickup pick1"><div>픽업 1</div></div>
<div class="pickup pick2"><div>픽업 2</div></div>
<div class="pickup pick3"><div>통상</div></div>

<div class="gacha gacha7"><div>1회 ◇130</div></div>
<div class="gacha gacha8"><div>10회 ◇1300</div></div>

<div class="sdWrapper" id="sdWrapper">
<div class="diamond"></div>
<img id="sdImage" class="sdChar">
</div>

<div id="leftArrow" class="arrow">◀</div>
<div id="rightArrow" class="arrow">▶</div>

</div>

<div id="resultOverlay" class="resultOverlay">
<div class="closeBtn" onclick="closeResult()">✕</div>
<div id="resultArea"></div>
</div>

</div>
</div>

<div id="rotateBlock" class="rotateWarning">
📱 가로 모드에서 이용해주세요.
</div>

<script>

/* ================= DB ================= */
let DB=[
{name:"발렌티나",rarity:3,group:"등불사무소"},
{name:"도로시",rarity:3,group:"등불사무소"},
{name:"백연",rarity:3,group:"등불사무소"},

{name:"올가",rarity:2,group:"등불사무소"},

{name:"오웬",rarity:2,group:"등불사무소"},
{name:"할",rarity:1,group:"등불사무소"},
{name:"재클린",rarity:1,group:"등불사무소"},
{name:"마리",rarity:3,group:"아스트론 학파 연구지구"},
{name:"가온",rarity:3,group:"아스트론 학파 연구지구"},
{name:"아이린",rarity:3,group:"아스트론 학파 연구지구"},
{name:"노딘",rarity:3,group:"아스트론 학파 연구지구"},
{name:"니콜라",rarity:2,group:"아스트론 학파 연구지구"},
{name:"로렌츠",rarity:2,group:"아스트론 학파 연구지구"},
{name:"프리츠",rarity:1,group:"아스트론 학파 연구지구"},
{name:"베르너",rarity:1,group:"아스트론 학파 연구지구"},
{name:"셀렌느",rarity:3,group:"하르덴브라흐"},
{name:"마커스",rarity:3,group:"하르덴브라흐"},
{name:"암젤",rarity:2,group:"하르덴브라흐"},
{name:"에밀리",rarity:1,group:"하르덴브라흐"},
{name:"안드레이",rarity:3,group:"66구역"},
{name:"드미트리",rarity:3,group:"66구역"},
{name:"공주",rarity:3,group:"66구역"},
{name:"안나",rarity:2,group:"66구역"},
{name:"모리어티",rarity:3,group:"터미널15"},
{name:"미셸",rarity:3,group:"터미널15"},
{name:"카산드라",rarity:3,group:"터미널15"},
{name:"제럴드",rarity:1,group:"터미널15"},
{name:"루핀",rarity:3,group:"볼칸 중공업"},
{name:"요루",rarity:3,group:"볼칸 중공업"},
{name:"헤더스",rarity:1,group:"볼칸 중공업"},
{name:"올리버",rarity:3,group:"찰스 브리게이드"},
{name:"오지에",rarity:3,group:"찰스 브리게이드"},
{name:"람다",rarity:3,group:"찰스 브리게이드"},
{name:"카롤",rarity:3,group:"찰스 브리게이드"},
{name:"모지",rarity:3,group:"찰스 브리게이드"},
{name:"란",rarity:3,group:"찰스 브리게이드"},
{name:"나모",rarity:2,group:"찰스 브리게이드"},
{name:"엘리아OS",rarity:3,group:"힌튼 아카이브"},
{name:"렌카",rarity:3,group:"미나모토"},
{name:"아토스",rarity:3,group:"미나모토"},
{name:"간류",rarity:3,group:"미나모토"},
{name:"레아",rarity:3,group:"미나모토"},
{name:"로건",rarity:2,group:"미나모토"},
{name:"츠카하라",rarity:1,group:"미나모토"},
{name:"랜슬롯",rarity:3,group:"아발론PMC"},
{name:"케이",rarity:3,group:"아발론PMC"},
{name:"트리스탄",rarity:3,group:"아발론PMC"},
{name:"이졸데",rarity:3,group:"아발론PMC"},
{name:"노미",rarity:3,group:"아발론PMC"},
{name:"가레스",rarity:2,group:"아발론PMC"},
{name:"이졸드",rarity:2,group:"아발론PMC"},
{name:"미래",rarity:3,group:"서천그룹"},
{name:"리",rarity:3,group:"서천그룹"},
{name:"이안",rarity:2,group:"서천그룹"},
{name:"리나",rarity:1,group:"서천그룹"},
{name:"스테파네트",rarity:3,group:"솔레어"},
{name:"뮌하우젠",rarity:2,group:"솔레어"}
];

/* ================= 상태 ================= */
let totalCount=parseInt(localStorage.getItem("totalCount"))||0;
let collection=JSON.parse(localStorage.getItem("collection"))||[];
let glow=parseInt(localStorage.getItem("glow"))||0;
let history=JSON.parse(localStorage.getItem("history"))||[];

/* ================= 배너 ================= */
const BANNERS=[
{
pickup3:["발렌티나"],
pickup2:["올가"],
preview:[
{name:"발렌티나",video:"bg1.mp4",sd:"sd1.PNG"},
{name:"할",video:"bg2.mp4",sd:"sd2.PNG"}
]
},
{
pickup3:["도로시"],
pickup2:["올가"],
preview:[
{name:"도로시",video:"bg3.mp4",sd:"sd3.PNG"},
{name:"올가",video:"bg4.mp4",sd:"sd4.PNG"}
]
},
{
pickup3:[],
pickup2:[],
preview:[
{name:"통상",video:"bg5.mp4",sd:""}
]
}
];

let currentBanner=0;
let currentIndex=0;

const video=document.getElementById("bgVideo");
const sdImage=document.getElementById("sdImage");
const sdWrapper=document.getElementById("sdWrapper");
const leftArrow=document.getElementById("leftArrow");
const rightArrow=document.getElementById("rightArrow");

/* ================= 배너 미리보기 ================= */
function updatePreview(){
let char=BANNERS[currentBanner].preview[currentIndex];
video.src=char.video;
video.play();

if(currentBanner===2){
sdWrapper.style.display="none";
leftArrow.style.display="none";
rightArrow.style.display="none";
}else{
sdWrapper.style.display="flex";
leftArrow.style.display="block";
rightArrow.style.display="block";
sdImage.src=char.sd;
}
}
leftArrow.onclick=()=>{currentIndex--;if(currentIndex<0)currentIndex=BANNERS[currentBanner].preview.length-1;updatePreview();}
rightArrow.onclick=()=>{currentIndex++;if(currentIndex>=BANNERS[currentBanner].preview.length)currentIndex=0;updatePreview();}
document.querySelectorAll(".pickup").forEach((el,i)=>{
el.onclick=()=>{
currentBanner=i;currentIndex=0;
document.querySelectorAll(".pickup").forEach(p=>p.classList.remove("active"));
el.classList.add("active");updatePreview();
};
});
document.querySelectorAll(".pickup")[0].classList.add("active");

/* ================= 확률 ================= */
function rollRarity(){
let r=Math.random();
if(r<0.03)return 3;
if(r<0.23)return 2;
return 1;
}

function weightedRoll(){
let rarity=rollRarity();
let pool=DB.filter(c=>c.rarity===rarity);

if(currentBanner!==2){
let p3=BANNERS[currentBanner].pickup3;
let p2=BANNERS[currentBanner].pickup2;

if(rarity===3&&Math.random()<0.5){
let pick=pool.find(c=>p3.includes(c.name));
if(pick)return pick;
}
if(rarity===2&&Math.random()<0.4){
let pick=pool.find(c=>p2.includes(c.name));
if(pick)return pick;
}
}

return pool[Math.floor(Math.random()*pool.length)];
}

/* ================= 가챠 실행 ================= */
function pull(times){
let results=[];
for(let i=0;i<times;i++){
results.push(weightedRoll());
}
if(times===10&&!results.some(c=>c.rarity>=2)){
let ultraPool=DB.filter(c=>c.rarity===2);
results[9]=ultraPool[Math.floor(Math.random()*ultraPool.length)];
}
showResults(results);
}

/* ================= 결과 ================= */
function showResults(results){
let overlay=document.getElementById("resultOverlay");
let area=document.getElementById("resultArea");
area.innerHTML="";
overlay.style.display="block";

for(let char of results){
totalCount++;glow++;
let isNew=!collection.includes(char.name);
if(isNew)collection.push(char.name);

let div=document.createElement("div");
div.className="resultCard "+(char.rarity===3?"lumen":char.rarity===2?"ultra":"infra");
div.innerHTML=`${char.rarity===3?"[LUMEN(★★★)]":char.rarity===2?"[ULTRA(★★)]":"[INFRA(★)]"} ${char.name} ${isNew?'<span class="newMark">New!</span>':''}`;
area.appendChild(div);
}

localStorage.setItem("totalCount",totalCount);
localStorage.setItem("collection",JSON.stringify(collection));
localStorage.setItem("glow",glow);
}

function closeResult(){
document.getElementById("resultOverlay").style.display="none";
}

/* ================= 버튼 ================= */
document.querySelector(".gacha7").onclick=()=>pull(1);
document.querySelector(".gacha8").onclick=()=>pull(10);

/* ================= 세로 차단 ================= */
function checkOrientation(){
if(window.innerHeight>window.innerWidth){
document.getElementById("rotateBlock").style.display="flex";
}else{
document.getElementById("rotateBlock").style.display="none";
}
}
window.addEventListener("resize",checkOrientation);
window.addEventListener("load",()=>{updatePreview();checkOrientation();});

</script>
</body>
</html>
