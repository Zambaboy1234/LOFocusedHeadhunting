<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>집중 헤드헌팅</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
background:#0f0f0f;
color:#ddd;
font-family:SUIT, Pretendard, sans-serif;
overflow:hidden;
}

/* =======================
   전체 레이아웃
======================= */
.main{
display:grid;
grid-template-columns: 18% 1fr 22%;
grid-template-rows: 1fr 90px;
height:100dvh; /* 모바일 정확 높이 */
}

/* =======================
   좌측 배너 선택
======================= */
.leftPanel{
padding:3vh 2vw;
display:flex;
flex-direction:column;
gap:2vh;
justify-content:center;
}

.bannerBtn{
background:#111;
border:2px solid #333;
padding:2vh;
font-size:clamp(14px, 1.8vw, 20px);
cursor:pointer;
}

.bannerBtn.active{
border:2px solid #fff;
}

/* =======================
   중앙 영역
======================= */
.centerPanel{
position:relative;
background:#151515;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.mainArt{
font-size:clamp(24px, 4vw, 60px);
opacity:0.15;
text-align:center;
}

/* 좌하단 정보 */
.subInfo{
position:absolute;
bottom:5vh;
left:5vw;
display:flex;
align-items:center;
gap:2vw;
}

.smallDiamond{
width:min(14vh,120px);
height:min(14vh,120px);
background:#111;
transform:rotate(45deg);
display:flex;
align-items:center;
justify-content:center;
}

.smallDiamond span{
transform:rotate(-45deg);
font-size:clamp(10px,1.2vw,14px);
}

.glowBar{
background:#111;
padding:1vh 1.5vw;
border:1px solid #333;
font-size:clamp(10px,1.2vw,14px);
}

/* =======================
   우측 가챠 버튼
======================= */
.rightPanel{
padding:3vh 2vw;
display:flex;
flex-direction:column;
gap:4vh;
justify-content:center;
align-items:flex-end;
}

.gachaBtn{
width:100%;
max-width:260px;
background:#111;
border:2px solid #333;
padding:2vh;
font-size:clamp(16px,2vw,22px);
cursor:pointer;
transform:skewX(-10deg);
text-align:center;
}

.gachaBtn span{
display:block;
transform:skewX(10deg);
}

/* =======================
   하단 네비
======================= */
.bottomNav{
grid-column:1 / span 3;
background:#0f0f0f;
display:flex;
justify-content:center;
align-items:center;
gap:6vw;
border-top:1px solid #222;
}

.navDiamond{
width:min(8vh,70px);
height:min(8vh,70px);
background:#111;
transform:rotate(45deg);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.navDiamond span{
transform:rotate(-45deg);
font-size:clamp(14px,2vw,18px);
}

/* =======================
   세로 모드 차단
======================= */
.rotateWarning{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f0f0f;
color:#fff;
display:none;
align-items:center;
justify-content:center;
text-align:center;
font-size:20px;
z-index:9999;
padding:20px;
}
</style>
</head>

<body>

<div class="main">

<!-- 좌측 -->
<div class="leftPanel">
<div class="bannerBtn active">픽업 1</div>
<div class="bannerBtn">픽업 2</div>
<div class="bannerBtn">통상</div>
</div>

<!-- 중앙 -->
<div class="centerPanel">
<div class="mainArt">MAIN CHARACTER ART</div>

<div class="subInfo">
<div class="smallDiamond">
<span>소형 캐릭터</span>
</div>
<div class="glowBar">
잔광 보정 200 / 200
</div>
</div>
</div>

<!-- 우측 -->
<div class="rightPanel">
<div class="gachaBtn">
<span>1회 ◇130</span>
</div>
<div class="gachaBtn">
<span>10회 ◇1300</span>
</div>
</div>

<!-- 하단 네비 -->
<div class="bottomNav">
<div class="navDiamond"><span>👤</span></div>
<div class="navDiamond"><span>📜</span></div>
<div class="navDiamond"><span>⚙</span></div>
<div class="navDiamond"><span>≡</span></div>
</div>

</div>

<!-- 세로 차단 -->
<div id="rotateBlock" class="rotateWarning">
<div>
📱<br><br>
이 화면은 가로 모드에서 이용해주세요.
</div>
</div>

<script>
function checkOrientation(){
if(window.innerHeight > window.innerWidth){
document.getElementById("rotateBlock").style.display="flex";
}else{
document.getElementById("rotateBlock").style.display="none";
}
}
window.addEventListener("resize",checkOrientation);
window.addEventListener("load",checkOrientation);
</script>

</body>
</html>
