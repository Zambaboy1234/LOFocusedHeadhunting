<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집중 헤드헌팅</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f0f;overflow:hidden;font-family:Pretendard,sans-serif;color:white;}

.screen{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
.canvas{position:relative;width:100%;max-width:1600px;aspect-ratio:16/9;overflow:hidden;}
.bgVideo{position:absolute;width:100%;height:100%;object-fit:cover;z-index:0;}
.leftShade{
position:absolute;top:0;left:0;height:100%;width:38%;
background:linear-gradient(to right,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.6) 40%,rgba(0,0,0,0.2) 70%,rgba(0,0,0,0) 100%);
z-index:1;
}
.uiLayer{position:absolute;width:100%;height:100%;z-index:2;}

.pickup{position:absolute;left:3%;width:22%;transform:skewX(-12deg);cursor:pointer;transition:0.25s;}
.pick1{top:12%;}.pick2{top:28%;}.pick3{top:42%;}
.pickup div{background:#111;border:2px solid #333;padding:6% 8%;font-size:1.3vw;transform:skewX(12deg);}
.pickup.active div{border-color:#aaa;box-shadow:0 0 1vw rgba(255,255,255,0.4);}

.gacha{position:absolute;right:5%;width:22%;transform:skewX(-12deg);cursor:pointer;}
.gacha7{top:36%;}.gacha8{top:50%;}
.gacha div{background:#111;border:2px solid #333;padding:8% 6%;font-size:1.5vw;text-align:center;transform:skewX(12deg);}

.overlay{
position:absolute;top:0;left:0;width:100%;height:100%;
background:#000;z-index:10;display:none;
}

/* ===== 차징 스테이지 ===== */

.stage{position:relative;width:100%;height:100%;overflow:hidden;}
.monitor{
position:absolute;width:18%;aspect-ratio:16/9;
background:#050505;border:2px solid #222;overflow:hidden;
}
.wave{
position:absolute;width:200%;height:3px;top:50%;
animation:wave 1s linear infinite;
}
@keyframes wave{
from{left:-100%;}
to{left:100%;}
}

.lantern{
position:absolute;width:14%;aspect-ratio:1/1;
border-radius:50%;border:3px solid #444;
top:50%;left:50%;transform:translate(-50%,-50%);
display:flex;align-items:center;justify-content:center;
transition:0.2s;
}
.flame{
width:45%;height:65%;
border-radius:50% 50% 40% 40%;
opacity:0;
transition:0.2s;
}

.shake{
animation:shake 0.08s infinite alternate;
}
@keyframes shake{
from{transform:translate(-50%,-50%) translateX(-3px);}
to{transform:translate(-50%,-50%) translateX(3px);}
}

.centerText{
position:absolute;bottom:10%;width:100%;
text-align:center;font-size:1.6vw;opacity:0.7;
}

.resultLine{font-size:1.3vw;margin:0.6vw;}
button{margin:0.5vw;padding:0.7vw 1.4vw;background:#111;border:1px solid #444;color:white;cursor:pointer;}
</style>
</head>

<body>

<div class="screen">
<div class="canvas">

<video id="bgVideo" class="bgVideo" muted loop playsinline></video>
<div class="leftShade"></div>

<div class="uiLayer">
<div class="pickup pick1"><div>픽업 1</div></div>
<div class="pickup pick2"><div>픽업 2</div></div>
<div class="pickup pick3"><div>통상</div></div>
<div class="gacha gacha7"><div>1회 ◇130</div></div>
<div class="gacha gacha8"><div>10회 ◇1300</div></div>
</div>

<div id="chargeLayer" class="overlay"></div>
<div id="iconLayer" class="overlay"></div>
<div id="newsLayer" class="overlay"></div>
<div id="finalLayer" class="overlay"></div>

</div>
</div>

<script>

/* ================= DB ================= */

let DB=[
{name:"발렌티나",rarity:3,group:"등불사무소"},
{name:"도로시",rarity:3,group:"등불사무소"},
{name:"백연",rarity:3,group:"등불사무소"},
{name:"쿠로세",rarity:2,group:"등불사무소"},
{name:"올가",rarity:2,group:"등불사무소"},
{name:"비아트리스",rarity:3,group:"등불사무소"},
{name:"유나",rarity:1,group:"등불사무소"},
{name:"오웬",rarity:2,group:"등불사무소"},
{name:"할",rarity:1,group:"등불사무소"},
{name:"재클린",rarity:1,group:"등불사무소"},
];

/* 확률 */
function rollRarity(){
let r=Math.random();
if(r<0.03)return 3;
if(r<0.23)return 2;
return 1;
}

function rollGacha(times){
let results=[];
for(let i=0;i<times;i++){
let rarity=rollRarity();
let pool=DB.filter(c=>c.rarity===rarity);
results.push(pool[Math.floor(Math.random()*pool.length)]);
}
if(times===10 && !results.some(c=>c.rarity>=2)){
let pool=DB.filter(c=>c.rarity===2);
results[9]=pool[Math.floor(Math.random()*pool.length)];
}
return results;
}

/* 상태 */
let GAME={isRolling:false,results:[],highest:1,newsIndex:0};

document.querySelector(".gacha7").onclick=()=>startGacha(1);
document.querySelector(".gacha8").onclick=()=>startGacha(10);

function startGacha(times){
if(GAME.isRolling)return;
GAME.isRolling=true;
GAME.results=rollGacha(times);
GAME.highest=Math.max(...GAME.results.map(r=>r.rarity));
showCharge();
}

/* ===== 차징 ===== */

function showCharge(){

let layer=document.getElementById("chargeLayer");
layer.style.display="block";

layer.innerHTML=`
<div class="stage" id="stage">

<div class="monitor" style="top:10%;left:10%"><div class="wave"></div></div>
<div class="monitor" style="top:15%;right:10%"><div class="wave"></div></div>
<div class="monitor" style="bottom:15%;left:12%"><div class="wave"></div></div>
<div class="monitor" style="bottom:12%;right:12%"><div class="wave"></div></div>

<div class="lantern" id="lantern">
<div class="flame" id="flame"></div>
</div>

<div class="centerText">꾹 눌러 차징</div>

</div>
`;

startChargeAnim();
}

function startChargeAnim(){

let flame=document.getElementById("flame");
let waves=document.querySelectorAll(".wave");
let lantern=document.getElementById("lantern");

let level=1;

function apply(lv){
flame.style.opacity=1;
lantern.classList.add("shake");

waves.forEach(w=>{
w.style.background= lv===1?"red":lv===2?"#b000ff":"silver";
w.style.animationDuration= lv===1?"1s":lv===2?"0.6s":"0.3s";
});

flame.style.background= lv===1?"red":lv===2?"#b000ff":"silver";
}

apply(1);

if(GAME.highest>=2)setTimeout(()=>apply(2),600);
if(GAME.highest>=3)setTimeout(()=>apply(3),1200);

document.getElementById("stage").onmousedown=()=>{
releaseImpact();
};
}

/* ===== 임팩트 ===== */

function releaseImpact(){

let layer=document.getElementById("chargeLayer");
let color= GAME.highest===1?"red":GAME.highest===2?"#b000ff":"silver";

layer.innerHTML=`
<div style="
width:100%;height:100%;
background:${color};
display:flex;align-items:center;justify-content:center;
font-size:4vw;
">⚡</div>
`;

setTimeout(()=>{
layer.style.display="none";
showIcons();
},300);
}

/* ===== 아이콘 공개 ===== */

function showIcons(){

let layer=document.getElementById("iconLayer");
layer.style.display="block";

let html="<div style='padding-top:15%;text-align:center'>";
GAME.results.forEach(r=>{
let color=r.rarity===1?"red":r.rarity===2?"#b000ff":"silver";
html+=`<div class="resultLine" style="color:${color}">${r.rarity}성</div>`;
});
html+=`<button onclick="nextNews()">다음</button>
<button onclick="skipGacha()">스킵</button>
</div>`;

layer.innerHTML=html;
}

/* ===== 뉴스 ===== */

function nextNews(){
document.getElementById("iconLayer").style.display="none";
GAME.newsIndex=0;
showNews();
}

function showNews(){
let layer=document.getElementById("newsLayer");
layer.style.display="block";

let char=GAME.results[GAME.newsIndex];

layer.innerHTML=`
<div style="padding-top:20%;text-align:center">
<h2>${char.name}</h2>
<p>${char.group}</p>
<p>${char.rarity}성</p>
<button onclick="nextNewsStep()">다음</button>
<button onclick="skipGacha()">스킵</button>
</div>
`;
}

function nextNewsStep(){
GAME.newsIndex++;
if(GAME.newsIndex>=GAME.results.length){
document.getElementById("newsLayer").style.display="none";
showFinal();
}else{
showNews();
}
}

/* ===== 최종 ===== */

function showFinal(){
let layer=document.getElementById("finalLayer");
layer.style.display="block";

let html="<div style='padding-top:15%;text-align:center'><h2>최종 결과</h2>";
GAME.results.forEach(r=>{
html+=`<div class="resultLine">${r.name} (${r.rarity}성)</div>`;
});
html+=`<button onclick="reset()">확인</button></div>`;
layer.innerHTML=html;
}

function skipGacha(){
document.getElementById("chargeLayer").style.display="none";
document.getElementById("iconLayer").style.display="none";
document.getElementById("newsLayer").style.display="none";
showFinal();
}

function reset(){
document.getElementById("finalLayer").style.display="none";
GAME.isRolling=false;
}

</script>
</body>
</html>
