<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집중 헤드헌팅</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#0f0f0f;
overflow:hidden;
font-family:Pretendard,sans-serif;
color:white;
}

/* 화면 중앙 */
.screen{
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* 16:9 */
.canvas{
position:relative;
width:100%;
max-width:1600px;
aspect-ratio:16/9;
overflow:hidden;
}

/* 배경 영상 */
.bgVideo{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* 왼쪽 블랙 베일 */
.leftShade{
position:absolute;
top:0;
left:0;
height:100%;
width:38%;
pointer-events:none;
z-index:1;
background:linear-gradient(
to right,
rgba(0,0,0,0.85) 0%,
rgba(0,0,0,0.6) 40%,
rgba(0,0,0,0.3) 65%,
rgba(0,0,0,0) 100%
);
}

/* UI 레이어 */
.uiLayer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:2;
}

/* 배너 */
.pickup{
position:absolute;
left:3%;
width:22%;
transform:skewX(-12deg);
transition:0.25s ease;
cursor:pointer;
}
.pick1{ top:12%; }
.pick2{ top:28%; }
.pick3{ top:42%; }

.pickup div{
background:#111;
border:2px solid #333;
padding:6% 8%;
font-size:1.3vw;
transform:skewX(12deg);
}

.pickup.active{
transform:skewX(-12deg) translateX(12px);
}

.pickup.active div{
border-color:#999;
box-shadow:0 0 20px rgba(255,255,255,0.4);
}

/* 가챠 버튼 */
.gacha{
position:absolute;
right:5%;
width:22%;
transform:skewX(-12deg);
cursor:pointer;
}
.gacha7{ top:36%; }
.gacha8{ top:50%; }

.gacha div{
background:#111;
border:2px solid #333;
padding:8% 6%;
text-align:center;
font-size:1.5vw;
transform:skewX(12deg);
}

/* SD 마름모 */
.bigDiamond{
position:absolute;
left:17%;
bottom:22%;
width:10%;
aspect-ratio:1/1;
background:#111;
transform:rotate(45deg);
display:flex;
align-items:center;
justify-content:center;
background-size:cover;
background-position:center;
}

.bigDiamond span{
transform:rotate(-45deg);
font-size:1vw;
}

/* 오버레이 연출 레이어 */
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
z-index:10;
display:none;
text-align:center;
padding-top:20%;
}

/* 세로 차단 */
.rotateWarning{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f0f0f;
display:none;
align-items:center;
justify-content:center;
text-align:center;
font-size:22px;
z-index:9999;
}
</style>
</head>

<body>

<div class="screen">
<div class="canvas">

<video id="bgVideo" class="bgVideo" muted loop playsinline preload="auto">
<source src="bg1.mp4" type="video/mp4">
</video>

<div class="leftShade"></div>

<div class="uiLayer">

<div class="pickup pick1"><div>픽업 1</div></div>
<div class="pickup pick2"><div>픽업 2</div></div>
<div class="pickup pick3"><div>통상</div></div>

<div class="gacha gacha7"><div>1회 ◇130</div></div>
<div class="gacha gacha8"><div>10회 ◇1300</div></div>

<div class="bigDiamond"><span></span></div>

</div>

<!-- 연출 레이어 -->
<div id="chargeLayer" class="overlay"></div>
<div id="iconLayer" class="overlay"></div>
<div id="newsLayer" class="overlay"></div>
<div id="finalLayer" class="overlay"></div>

</div>
</div>

<div id="rotateBlock" class="rotateWarning">
📱<br><br>가로 모드에서 이용해주세요.
</div>

<script>

/* =========================
   배너 데이터
========================= */

const BANNERS = [
{
name:"픽업 1",
characters:[
{ name:"발렌티나", rarity:3, video:"bg1.mp4", sd:"sd1.png" },
{ name:"할", rarity:2, video:"bg2.mp4", sd:"sd2.png" }
]
},
{
name:"픽업 2",
characters:[
{ name:"도로시", rarity:3, video:"bg3.mp4", sd:"sd3.png" },
{ name:"올가", rarity:2, video:"bg4.mp4", sd:"sd4.png" }
]
},
{
name:"통상",
characters:[
{ name:"통상", rarity:1, video:"bg5.mp4", sd:"" }
]
}
];

let currentBanner = 0;
let currentCharIndex = 0;

const video = document.getElementById("bgVideo");
const diamond = document.querySelector(".bigDiamond span");

/* 배너 선택 */

document.querySelectorAll(".pickup").forEach((el,index)=>{
el.addEventListener("click",()=>{
currentBanner = index;
currentCharIndex = 0;

document.querySelectorAll(".pickup").forEach(p=>p.classList.remove("active"));
el.classList.add("active");

updatePreview();
});
});

document.querySelectorAll(".pickup")[0].classList.add("active");

/* 프리뷰 업데이트 */

function updatePreview(){

let banner = BANNERS[currentBanner];

if(currentBanner === 2){
let char = banner.characters[0];
video.src = char.video;
video.load();
video.play().catch(()=>{});
diamond.innerText="";
document.querySelector(".bigDiamond").style.backgroundImage="none";
return;
}

let char = banner.characters[currentCharIndex];
video.src = char.video;
video.load();
video.play().catch(()=>{});
diamond.innerText = char.name;
document.querySelector(".bigDiamond").style.backgroundImage=`url(${char.sd})`;
}

/* =========================
   가챠 엔진 (1차)
========================= */

let GAME = {
isRolling:false,
results:[],
newsIndex:0
};

function rollRarity(){
let r=Math.random();
if(r<0.03)return 3;
if(r<0.23)return 2;
return 1;
}

function rollGacha(times){
let results=[];
let banner=BANNERS[currentBanner];

for(let i=0;i<times;i++){
let rarity=rollRarity();
let pool=banner.characters.filter(c=>c.rarity===rarity);

if(currentBanner!==2){
let weighted=[];
banner.characters.forEach(c=>{
if(c.rarity===rarity){
weighted.push(c,c,c);
}
});
if(weighted.length>0) pool=weighted;
}

if(pool.length===0) pool=banner.characters;
results.push(pool[Math.floor(Math.random()*pool.length)]);
}
return results;
}

document.querySelector(".gacha7").addEventListener("click",()=>startGacha(1));
document.querySelector(".gacha8").addEventListener("click",()=>startGacha(10));

function startGacha(times){
if(GAME.isRolling)return;
GAME.isRolling=true;
GAME.results=rollGacha(times);
showCharge();
}

function showCharge(){
let layer=document.getElementById("chargeLayer");
layer.style.display="block";
layer.innerHTML=`<h2>차징...</h2>
<button onclick="nextToIcons()">손 놓기</button>
<button onclick="skipGacha()">스킵</button>`;
}

function nextToIcons(){
document.getElementById("chargeLayer").style.display="none";
showIcons();
}

function showIcons(){
let layer=document.getElementById("iconLayer");
layer.style.display="block";
let html="<h2>등급 공개</h2>";
GAME.results.forEach(r=>{
html+=`<div>${r.rarity}성</div>`;
});
html+=`<button onclick="nextToNews()">다음</button>
<button onclick="skipGacha()">스킵</button>`;
layer.innerHTML=html;
}

function nextToNews(){
document.getElementById("iconLayer").style.display="none";
GAME.newsIndex=0;
showNews();
}

function showNews(){
let layer=document.getElementById("newsLayer");
layer.style.display="block";
let char=GAME.results[GAME.newsIndex];
layer.innerHTML=`<h2>${char.name}</h2>
<p>${char.rarity}성</p>
<button onclick="nextNews()">다음</button>
<button onclick="skipGacha()">스킵</button>`;
}

function nextNews(){
GAME.newsIndex++;
if(GAME.newsIndex>=GAME.results.length){
document.getElementById("newsLayer").style.display="none";
showFinal();
}else{
showNews();
}
}

function showFinal(){
let layer=document.getElementById("finalLayer");
layer.style.display="block";
let html="<h2>최종 결과</h2>";
GAME.results.forEach(r=>{
html+=`<div>${r.name} (${r.rarity}성)</div>`;
});
html+=`<button onclick="resetToBanner()">확인</button>`;
layer.innerHTML=html;
}

function skipGacha(){
document.getElementById("chargeLayer").style.display="none";
document.getElementById("iconLayer").style.display="none";
document.getElementById("newsLayer").style.display="none";
showFinal();
}

function resetToBanner(){
document.getElementById("finalLayer").style.display="none";
GAME.isRolling=false;
}

updatePreview();

/* 가로 모드 체크 */

function checkOrientation(){
if(window.innerHeight > window.innerWidth){
document.getElementById("rotateBlock").style.display="flex";
}else{
document.getElementById("rotateBlock").style.display="none";
}
}
window.addEventListener("resize",checkOrientation);
window.addEventListener("load",checkOrientation);

</script>

</body>
</html>
