<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집중 헤드헌팅</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#EEEEE;
overflow:hidden;
font-family:Pretendard, sans-serif;
color:white;
}

/* ================= 화면 래퍼 ================= */

.screen{
position:relative;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.canvas{
position:relative;
width:100%;
max-width:1600px;
aspect-ratio:16/9;
background:url("bg.jpg") center/cover no-repeat;
overflow:hidden;
}

/* ================= 왼쪽 블랙 그라데이션 ================= */

.leftShade{
position:absolute;
top:0;
left:0;
height:100%;
width:42%;
pointer-events:none;
background:linear-gradient(
to right,
rgba(0,0,0,0.8) 0%,
rgba(0,0,0,0.6) 35%,
rgba(0,0,0,0.3) 60%,
rgba(0,0,0,0) 100%
);
}

/* ================= 픽업 버튼 ================= */

.pickupGroup{
position:absolute;
left:4%;
top:18%;
display:flex;
flex-direction:column;
gap:6%;
width:18%;
}

.pickupBtn{
background:#111;
border:2px solid #333;
padding:6% 8%;
font-size:1.2vw;
}

.pickupBtn.active{
border:2px solid white;
}

/* ================= 가챠 버튼 ================= */

.gachaGroup{
position:absolute;
right:6%;
top:38%;
display:flex;
flex-direction:column;
gap:8%;
width:20%;
}

.gachaBtn{
background:#111;
border:2px solid #333;
padding:8% 6%;
transform:skewX(-12deg);
text-align:center;
font-size:1.4vw;
}

.gachaBtn span{
display:block;
transform:skewX(12deg);
}

/* ================= 좌하단 정보 ================= */

.subInfo{
position:absolute;
left:18%;
bottom:20%;
display:flex;
align-items:center;
gap:3%;
}

.smallDiamond{
width:7vw;
height:7vw;
max-width:120px;
max-height:120px;
background:#111;
transform:rotate(45deg);
display:flex;
align-items:center;
justify-content:center;
}

.smallDiamond span{
transform:rotate(-45deg);
font-size:0.9vw;
}

.glowBar{
background:#111;
padding:0.8vw 1.5vw;
border:1px solid #333;
font-size:0.9vw;
}

/* ================= 하단 네비 ================= */

.bottomNav{
position:absolute;
bottom:5%;
left:50%;
transform:translateX(-50%);
display:flex;
gap:4vw;
}

.navDiamond{
width:4.5vw;
height:4.5vw;
background:#111;
transform:rotate(45deg);
display:flex;
align-items:center;
justify-content:center;
}

.navDiamond span{
transform:rotate(-45deg);
font-size:1.3vw;
}

/* ================= 세로 차단 ================= */

.rotateWarning{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f0f0f;
display:none;
align-items:center;
justify-content:center;
text-align:center;
font-size:22px;
z-index:9999;
}
</style>
</head>

<body>

<div class="screen">
<div class="canvas">

<div class="leftShade"></div>

<!-- 픽업 -->
<div class="pickupGroup">
<div class="pickupBtn active">픽업 1</div>
<div class="pickupBtn">픽업 2</div>
<div class="pickupBtn">통상</div>
</div>

<!-- 가챠 -->
<div class="gachaGroup">
<div class="gachaBtn"><span>1회 ◇130</span></div>
<div class="gachaBtn"><span>10회 ◇1300</span></div>
</div>

<!-- 좌하단 -->
<div class="subInfo">
<div class="smallDiamond"><span>소형 캐릭터</span></div>
<div class="glowBar">잔광 보정 200 / 200</div>
</div>

<!-- 하단 네비 -->
<div class="bottomNav">
<div class="navDiamond"><span>👤</span></div>
<div class="navDiamond"><span>📜</span></div>
<div class="navDiamond"><span>⚙</span></div>
<div class="navDiamond"><span>≡</span></div>
</div>

</div>
</div>

<div id="rotateBlock" class="rotateWarning">
📱<br><br>
가로 모드에서 이용해주세요.
</div>

<script>
function checkOrientation(){
if(window.innerHeight > window.innerWidth){
document.getElementById("rotateBlock").style.display="flex";
}else{
document.getElementById("rotateBlock").style.display="none";
}
}
window.addEventListener("resize",checkOrientation);
window.addEventListener("load",checkOrientation);
</script>

</body>
</html>
