<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집중 헤드헌팅</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#0f0f0f;
overflow:hidden;
font-family:Pretendard,sans-serif;
color:white;
}

/* 16:9 고정 */
.screen{
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.canvas{
position:relative;
width:100%;
max-width:1600px;
aspect-ratio:16/9;
overflow:hidden;
}

/* 영상 */
.bgVideo{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* 좌측 블랙 */
.leftShade{
position:absolute;
top:0;
left:0;
height:100%;
width:38%;
background:linear-gradient(
to right,
rgba(0,0,0,0.85) 0%,
rgba(0,0,0,0.6) 40%,
rgba(0,0,0,0.3) 65%,
rgba(0,0,0,0) 100%
);
z-index:1;
}

/* UI */
.uiLayer{
position:absolute;
width:100%;
height:100%;
z-index:2;
}

/* 배너 */
.pickup{
position:absolute;
left:3%;
width:22%;
transform:skewX(-12deg);
transition:0.25s ease;
cursor:pointer;
}
.pick1{top:12%;}
.pick2{top:28%;}
.pick3{top:42%;}

.pickup div{
background:#111;
border:2px solid #333;
padding:6% 8%;
font-size:1.3vw;
transform:skewX(12deg);
}

.pickup.active{
transform:skewX(-12deg) translateX(0.8vw);
}

.pickup.active div{
border-color:#999;
box-shadow:0 0 1vw rgba(255,255,255,0.4);
}

/* 가챠 버튼 */
.gacha{
position:absolute;
right:5%;
width:22%;
transform:skewX(-12deg);
cursor:pointer;
}
.gacha7{top:36%;}
.gacha8{top:50%;}

.gacha div{
background:#111;
border:2px solid #333;
padding:8% 6%;
font-size:1.5vw;
text-align:center;
transform:skewX(12deg);
}

/* SD 영역 */
.sdWrapper{
position:absolute;
left:17%;
bottom:22%;
width:10%;
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
}

/* 마름모 */
.diamond{
position:absolute;
width:100%;
height:100%;
background:#111;
transform:rotate(45deg);
z-index:1;
}

/* SD */
.sdChar{
position:absolute;
bottom:-10%;
width:170%;
height:auto;
z-index:2;
pointer-events:none;
}

/* 화살표 */
.arrow{
position:absolute;
top:50%;
font-size:2vw;
cursor:pointer;
user-select:none;
z-index:3;
}
#leftArrow{left:42%;}
#rightArrow{right:42%;}

/* 가로 차단 */
.rotateWarning{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f0f0f;
display:none;
align-items:center;
justify-content:center;
text-align:center;
font-size:4vw;
z-index:9999;
}
</style>
</head>

<body>

<div class="screen">
<div class="canvas">

<video id="bgVideo" class="bgVideo" muted loop playsinline>
<source src="bg1.mp4" type="video/mp4">
</video>

<div class="leftShade"></div>

<div class="uiLayer">

<div class="pickup pick1"><div>픽업 1</div></div>
<div class="pickup pick2"><div>픽업 2</div></div>
<div class="pickup pick3"><div>통상</div></div>

<div class="gacha gacha7"><div>1회 ◇130</div></div>
<div class="gacha gacha8"><div>10회 ◇1300</div></div>

<div class="sdWrapper" id="sdWrapper">
<div class="diamond"></div>
<img id="sdImage" class="sdChar" src="sd1.PNG">
</div>

<div id="leftArrow" class="arrow">◀</div>
<div id="rightArrow" class="arrow">▶</div>

</div>
</div>
</div>

<div id="rotateBlock" class="rotateWarning">
📱 가로 모드에서 이용해주세요.
</div>

<script>
function checkOrientation(){
if(window.innerHeight>window.innerWidth){
document.getElementById("rotateBlock").style.display="flex";
}else{
document.getElementById("rotateBlock").style.display="none";
}
}
window.addEventListener("resize",checkOrientation);
window.addEventListener("load",checkOrientation);
</script>

</body>
</html>
