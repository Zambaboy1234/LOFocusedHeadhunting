<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>가챠 엔진 테스트</title>
<style>
body{background:#111;color:white;font-family:sans-serif;text-align:center;padding:20px;}
button{padding:10px 20px;margin:5px;}
.hidden{display:none;}
.icon{display:inline-block;width:40px;height:40px;border-radius:50%;margin:5px;line-height:40px;}
.r1{background:red;}
.r2{background:violet;}
.r3{background:silver;}
.newsCard{border:1px solid #444;padding:20px;margin-top:20px;}
</style>
</head>
<body>

<h2>가챠 배너 선택</h2>
<div id="bannerArea"></div>

<hr>

<div id="gachaArea">
<button onclick="startGacha(1)">1회 뽑기</button>
<button onclick="startGacha(10)">10회 뽑기</button>
</div>

<hr>

<div id="chargeArea" class="hidden">
<h3>차징 중...</h3>
<button onclick="releaseCharge()">손 놓기</button>
</div>

<div id="iconArea" class="hidden">
<h3>아이콘 공개</h3>
<div id="iconContainer"></div>
<button onclick="nextPhase()">다음</button>
</div>

<div id="newsArea" class="hidden">
<div id="newsContainer"></div>
<button onclick="nextNews()">다음 캐릭터</button>
</div>

<div id="finalArea" class="hidden">
<h3>최종 결과</h3>
<div id="finalContainer"></div>
<button onclick="resetToBanner()">배너로 복귀</button>
</div>

<script>

/* ===== DB ===== */
var DB=[
{name:"발렌티나",rarity:3},
{name:"도로시",rarity:3},
{name:"할",rarity:2},
{name:"올가",rarity:2},
{name:"재클린",rarity:1},
{name:"리나",rarity:1}
];

/* ===== 배너 ===== */
var BANNERS=[
{name:"픽업 1",pickups:["발렌티나","할"]},
{name:"픽업 2",pickups:["도로시","올가"]},
{name:"통상",pickups:[]}
];

var GAME={
state:"banner",
currentBanner:0,
results:[],
highest:1,
isRolling:false,
newsIndex:0
};

/* 배너 렌더 */
function renderBanners(){
var html="";
for(var i=0;i<BANNERS.length;i++){
html+='<button onclick="selectBanner('+i+')">'+BANNERS[i].name+'</button>';
}
document.getElementById("bannerArea").innerHTML=html;
}
renderBanners();

function selectBanner(i){
GAME.currentBanner=i;
alert("선택됨: "+BANNERS[i].name);
}

/* 확률 */
function rollRarity(){
var r=Math.random();
if(r<0.03)return 3;
if(r<0.23)return 2;
return 1;
}

function rollGacha(times){
var results=[];
for(var i=0;i<times;i++){
var rarity=rollRarity();
var pool=[];
for(var j=0;j<DB.length;j++){
if(DB[j].rarity===rarity)pool.push(DB[j]);
}

if(GAME.currentBanner!==2){
var pickups=BANNERS[GAME.currentBanner].pickups;
var weighted=[];
for(var k=0;k<pool.length;k++){
var c=pool[k];
if(pickups.indexOf(c.name)!==-1){
weighted.push(c,c,c);
}
weighted.push(c);
}
pool=weighted;
}

results.push(pool[Math.floor(Math.random()*pool.length)]);
}
return results;
}

/* 가챠 시작 */
function startGacha(times){
if(GAME.isRolling)return;

GAME.isRolling=true;
GAME.results=rollGacha(times);

/* 최고 등급 계산 (spread 제거) */
var max=1;
for(var i=0;i<GAME.results.length;i++){
if(GAME.results[i].rarity>max){
max=GAME.results[i].rarity;
}
}
GAME.highest=max;

document.getElementById("gachaArea").classList.add("hidden");
document.getElementById("chargeArea").classList.remove("hidden");
GAME.state="charging";
}

function releaseCharge(){
if(GAME.state!=="charging")return;

document.getElementById("chargeArea").classList.add("hidden");
showIcons();
}

function showIcons(){
GAME.state="icons";
var container=document.getElementById("iconContainer");
container.innerHTML="";
for(var i=0;i<GAME.results.length;i++){
var r=GAME.results[i];
var div=document.createElement("div");
div.className="icon r"+r.rarity;
div.innerHTML=r.rarity;
container.appendChild(div);
}
document.getElementById("iconArea").classList.remove("hidden");
}

function nextPhase(){
document.getElementById("iconArea").classList.add("hidden");
GAME.newsIndex=0;
showNews();
}

function showNews(){
GAME.state="news";
var char=GAME.results[GAME.newsIndex];
document.getElementById("newsContainer").innerHTML=
'<div class="newsCard"><h2>'+char.name+
'</h2><p>등급: '+char.rarity+'성</p></div>';
document.getElementById("newsArea").classList.remove("hidden");
}

function nextNews(){
GAME.newsIndex++;
if(GAME.newsIndex>=GAME.results.length){
document.getElementById("newsArea").classList.add("hidden");
showFinal();
}else{
showNews();
}
}

function showFinal(){
GAME.state="final";
var html="";
for(var i=0;i<GAME.results.length;i++){
var r=GAME.results[i];
html+='<div>'+r.name+' ('+r.rarity+'성)</div>';
}
document.getElementById("finalContainer").innerHTML=html;
document.getElementById("finalArea").classList.remove("hidden");
}

function resetToBanner(){
GAME.state="banner";
GAME.isRolling=false;
document.getElementById("finalArea").classList.add("hidden");
document.getElementById("gachaArea").classList.remove("hidden");
}

</script>

</body>
</html>
