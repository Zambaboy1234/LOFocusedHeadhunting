<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집중 헤드헌팅</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f0f;overflow:hidden;font-family:Pretendard,sans-serif;color:white;}

.screen{
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.canvas{
position:relative;
width:100%;
max-width:1600px;
aspect-ratio:16/9;
overflow:hidden;
}

/* 🎥 배경 영상 */
.bgVideo{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* 왼쪽 블랙 베일 */
.leftShade{
position:absolute;
top:0;
left:0;
height:100%;
width:38%;
pointer-events:none;
z-index:1;
background:linear-gradient(
to right,
rgba(0,0,0,0.85) 0%,
rgba(0,0,0,0.6) 40%,
rgba(0,0,0,0.3) 65%,
rgba(0,0,0,0) 100%
);
}

/* ===== UI는 영상 위 ===== */
.uiLayer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:2;
}

/* 픽업 */
.pickup{
position:absolute;
left:3%;
width:22%;
transform:skewX(-12deg);
}
.pick1{ top:12%; }
.pick2{ top:28%; }
.pick3{ top:42%; }

.pickup div{
background:#111;
border:2px solid #333;
padding:6% 8%;
font-size:1.3vw;
transform:skewX(12deg);
}

/* 가챠 */
.gacha{
position:absolute;
right:5%;
width:22%;
transform:skewX(-12deg);
}
.gacha7{ top:36%; }
.gacha8{ top:50%; }

.gacha div{
background:#111;
border:2px solid #333;
padding:8% 6%;
text-align:center;
font-size:1.5vw;
transform:skewX(12deg);
}

/* 큰 마름모 */
.bigDiamond{
position:absolute;
left:17%;
bottom:22%;
width:10%;
aspect-ratio:1/1;
background:#111;
transform:rotate(45deg);
display:flex;
align-items:center;
justify-content:center;
}

.bigDiamond span{
transform:rotate(-45deg);
font-size:1vw;
}

/* 하단 네비 */
.bottomNav{
position:absolute;
right:6%;
bottom:6%;
display:flex;
gap:2.5vw;
}

.bottomNav div{
width:4vw;
aspect-ratio:1/1;
background:#111;
transform:rotate(45deg);
display:flex;
align-items:center;
justify-content:center;
}

.bottomNav span{
transform:rotate(-45deg);
font-size:1.3vw;
}

/* 세로 차단 */
.rotateWarning{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f0f0f;
display:none;
align-items:center;
justify-content:center;
text-align:center;
font-size:22px;
z-index:9999;
}
</style>
</head>

<body>

<div class="screen">
<div class="canvas">

<!-- 🎥 배경 영상 -->
<video id="bgVideo"
class="bgVideo"
autoplay
muted
loop
playsinline
preload="auto">
<source src="bg.mp4" type="video/mp4">
</video>

<div class="leftShade"></div>

<div class="uiLayer">

<div class="pickup pick1"><div>픽업 1</div></div>
<div class="pickup pick2"><div>픽업 2</div></div>
<div class="pickup pick3"><div>통상</div></div>

<div class="gacha gacha7"><div>1회 ◇130</div></div>
<div class="gacha gacha8"><div>10회 ◇1300</div></div>

<div class="bigDiamond"><span>소형 캐릭터</span></div>

<div class="bottomNav">
<div><span>👤</span></div>
<div><span>📜</span></div>
<div><span>⚙</span></div>
<div><span>≡</span></div>
</div>

</div>
</div>
</div>

<div id="rotateBlock" class="rotateWarning">
📱<br><br>가로 모드에서 이용해주세요.
</div>

<script>
function checkOrientation(){
if(window.innerHeight > window.innerWidth){
document.getElementById("rotateBlock").style.display="flex";
}else{
document.getElementById("rotateBlock").style.display="none";
}
}

window.addEventListener("resize",checkOrientation);

window.addEventListener("load",function(){
checkOrientation();

const video = document.getElementById("bgVideo");
if(video){
video.play().catch(()=>{});
}
});
</script>

</body>
</html>
