<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집중 헤드헌팅</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f0f;overflow:hidden;font-family:Pretendard,sans-serif;color:white;}

.screen{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
.canvas{position:relative;width:100%;max-width:1600px;aspect-ratio:16/9;overflow:hidden;}

.bgVideo{position:absolute;width:100%;height:100%;object-fit:cover;z-index:0;}

.leftShade{
position:absolute;top:0;left:0;height:100%;width:38%;
background:linear-gradient(to right,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.6) 40%,rgba(0,0,0,0.2) 70%,rgba(0,0,0,0) 100%);
z-index:1;
}

.uiLayer{position:absolute;width:100%;height:100%;z-index:2;}

/* 배너 */
.pickup{position:absolute;left:3%;width:22%;transform:skewX(-12deg);cursor:pointer;transition:0.25s;}
.pick1{top:12%;}.pick2{top:28%;}.pick3{top:42%;}
.pickup div{background:#111;border:2px solid #333;padding:6% 8%;font-size:1.3vw;transform:skewX(12deg);}
.pickup.active{transform:skewX(-12deg) translateX(0.8vw);}
.pickup.active div{border-color:#aaa;box-shadow:0 0 1vw rgba(255,255,255,0.4);}

/* 가챠 버튼 */
.gacha{position:absolute;right:5%;width:22%;transform:skewX(-12deg);cursor:pointer;}
.gacha7{top:36%;}.gacha8{top:50%;}
.gacha div{background:#111;border:2px solid #333;padding:8% 6%;font-size:1.5vw;text-align:center;transform:skewX(12deg);}

/* SD */
.sdWrapper{position:absolute;left:17%;bottom:22%;width:10%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;}
.diamond{position:absolute;width:100%;height:100%;background:#111;transform:rotate(45deg);}
.sdChar{position:absolute;bottom:-10%;width:170%;height:auto;pointer-events:none;}

.arrow{position:absolute;top:50%;font-size:2vw;cursor:pointer;user-select:none;}
#leftArrow{left:42%;}#rightArrow{right:42%;}

/* 연출 */
.overlay{
position:absolute;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);z-index:10;
display:none;text-align:center;padding-top:15%;
}

.overlay h2{font-size:2vw;margin-bottom:2vw;}
.overlay button{
margin:0.5vw;padding:0.8vw 1.6vw;
background:#222;border:1px solid #555;color:white;cursor:pointer;font-size:1vw;
}

.resultLine{font-size:1.2vw;margin:0.4vw;}

.rotateWarning{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#0f0f0f;display:none;align-items:center;justify-content:center;
text-align:center;font-size:3vw;z-index:9999;
}
</style>
</head>

<body>

<div class="screen">
<div class="canvas">

<video id="bgVideo" class="bgVideo" muted loop playsinline></video>
<div class="leftShade"></div>

<div class="uiLayer">

<div class="pickup pick1"><div>픽업 1</div></div>
<div class="pickup pick2"><div>픽업 2</div></div>
<div class="pickup pick3"><div>통상</div></div>

<div class="gacha gacha7"><div>1회 ◇130</div></div>
<div class="gacha gacha8"><div>10회 ◇1300</div></div>

<div class="sdWrapper" id="sdWrapper">
<div class="diamond"></div>
<img id="sdImage" class="sdChar">
</div>

<div id="leftArrow" class="arrow">◀</div>
<div id="rightArrow" class="arrow">▶</div>

</div>

<div id="chargeLayer" class="overlay"></div>
<div id="iconLayer" class="overlay"></div>
<div id="newsLayer" class="overlay"></div>
<div id="finalLayer" class="overlay"></div>

</div>
</div>

<div id="rotateBlock" class="rotateWarning">
📱 가로 모드에서 이용해주세요.
</div>

<script>

/* ================= DB ================= */

let DB=[
{name:"발렌티나",rarity:3,group:"등불사무소"},
{name:"도로시",rarity:3,group:"등불사무소"},
{name:"백연",rarity:3,group:"등불사무소"},
{name:"쿠로세",rarity:2,group:"등불사무소"},
{name:"올가",rarity:2,group:"등불사무소"},
{name:"비아트리스",rarity:3,group:"등불사무소"},
{name:"유나",rarity:1,group:"등불사무소"},
{name:"오웬",rarity:2,group:"등불사무소"},
{name:"할",rarity:1,group:"등불사무소"},
{name:"재클린",rarity:1,group:"등불사무소"},
];

/* 배너 */

const BANNERS = [
{
preview:[
{name:"발렌티나",video:"bg1.mp4",sd:"sd1.PNG"},
{name:"할",video:"bg2.mp4",sd:"sd2.PNG"}
],
pickup:["발렌티나"]
},
{
preview:[
{name:"도로시",video:"bg3.mp4",sd:"sd3.PNG"},
{name:"올가",video:"bg4.mp4",sd:"sd4.PNG"}
],
pickup:["도로시"]
},
{
preview:[
{name:"통상",video:"bg5.mp4",sd:""}
],
pickup:[]
}
];

/* 상태 */

let currentBanner=0;
let currentIndex=0;
let GAME={isRolling:false,results:[],newsIndex:0};

/* 프리뷰 */

const video=document.getElementById("bgVideo");
const sdImage=document.getElementById("sdImage");
const sdWrapper=document.getElementById("sdWrapper");
const leftArrow=document.getElementById("leftArrow");
const rightArrow=document.getElementById("rightArrow");

function updatePreview(){
let char=BANNERS[currentBanner].preview[currentIndex];
video.src=char.video; video.play();

if(currentBanner===2){
sdWrapper.style.display="none";
leftArrow.style.display="none";
rightArrow.style.display="none";
}else{
sdWrapper.style.display="flex";
leftArrow.style.display="block";
rightArrow.style.display="block";
sdImage.src=char.sd;
}
}

leftArrow.onclick=()=>{currentIndex=(currentIndex-1+ BANNERS[currentBanner].preview.length)%BANNERS[currentBanner].preview.length;updatePreview();}
rightArrow.onclick=()=>{currentIndex=(currentIndex+1)%BANNERS[currentBanner].preview.length;updatePreview();}

document.querySelectorAll(".pickup").forEach((el,i)=>{
el.onclick=()=>{
currentBanner=i;currentIndex=0;
document.querySelectorAll(".pickup").forEach(p=>p.classList.remove("active"));
el.classList.add("active");
updatePreview();
};
});
document.querySelectorAll(".pickup")[0].classList.add("active");

/* ================= 확률 ================= */

function rollRarity(){
let r=Math.random();
if(r<0.03)return 3;
if(r<0.23)return 2;
return 1;
}

function rollGacha(times){
let results=[];

for(let i=0;i<times;i++){

let rarity=rollRarity();
let pool=DB.filter(c=>c.rarity===rarity);

if(currentBanner!==2){

let pickupList=BANNERS[currentBanner].pickup;

if(pickupList.length>0){

/* ===== 3성 픽업 50% ===== */
if(rarity===3){
if(Math.random()<0.5){
let pickupPool=pool.filter(c=>pickupList.includes(c.name));
if(pickupPool.length>0){
results.push(pickupPool[Math.floor(Math.random()*pickupPool.length)]);
continue;
}
}
}

/* ===== 2성 픽업 30% ===== */
if(rarity===2){
if(Math.random()<0.3){
let pickupPool=pool.filter(c=>pickupList.includes(c.name));
if(pickupPool.length>0){
results.push(pickupPool[Math.floor(Math.random()*pickupPool.length)]);
continue;
}
}
}

}

}

/* 일반 풀 */
results.push(pool[Math.floor(Math.random()*pool.length)]);
}

/* ===== 10연 보정 ===== */
if(times===10 && !results.some(c=>c.rarity>=2)){

let rarity=2;
let pool=DB.filter(c=>c.rarity===2);

if(currentBanner!==2){
let pickupList=BANNERS[currentBanner].pickup;

/* 2성 보정도 동일 30% 룰 적용 */
if(pickupList.length>0 && Math.random()<0.3){
let pickupPool=pool.filter(c=>pickupList.includes(c.name));
if(pickupPool.length>0){
results[9]=pickupPool[Math.floor(Math.random()*pickupPool.length)];
}else{
results[9]=pool[Math.floor(Math.random()*pool.length)];
}
}else{
results[9]=pool[Math.floor(Math.random()*pool.length)];
}
}else{
results[9]=pool[Math.floor(Math.random()*pool.length)];
}

}

return results;
}

/* ================= 연출 ================= */

document.querySelector(".gacha7").onclick=()=>startGacha(1);
document.querySelector(".gacha8").onclick=()=>startGacha(10);

function startGacha(times){
if(GAME.isRolling)return;
GAME.isRolling=true;
GAME.results=rollGacha(times);
showCharge();
}

function showCharge(){
let layer=document.getElementById("chargeLayer");
layer.style.display="block";
layer.innerHTML=`<h2>차징...</h2>
<button onclick="nextToIcons()">손 놓기</button>
<button onclick="skipGacha()">스킵</button>`;
}

function nextToIcons(){
document.getElementById("chargeLayer").style.display="none";
showIcons();
}

function showIcons(){
let layer=document.getElementById("iconLayer");
layer.style.display="block";
let html="<h2>등급 공개</h2>";
GAME.results.forEach(r=>{html+=`<div class="resultLine">${r.rarity}성</div>`});
html+=`<button onclick="nextToNews()">다음</button>
<button onclick="skipGacha()">스킵</button>`;
layer.innerHTML=html;
}

function nextToNews(){
document.getElementById("iconLayer").style.display="none";
GAME.newsIndex=0;
showNews();
}

function showNews(){
let layer=document.getElementById("newsLayer");
layer.style.display="block";
let char=GAME.results[GAME.newsIndex];
layer.innerHTML=`<h2>${char.name}</h2>
<p>${char.rarity}성</p>
<button onclick="nextNews()">다음</button>
<button onclick="skipGacha()">스킵</button>`;
}

function nextNews(){
GAME.newsIndex++;
if(GAME.newsIndex>=GAME.results.length){
document.getElementById("newsLayer").style.display="none";
showFinal();
}else{
showNews();
}
}

function showFinal(){
let layer=document.getElementById("finalLayer");
layer.style.display="block";
let html="<h2>최종 결과</h2>";
GAME.results.forEach(r=>{html+=`<div class="resultLine">${r.name} (${r.rarity}성)</div>`});
html+=`<button onclick="resetToBanner()">확인</button>`;
layer.innerHTML=html;
}

function skipGacha(){
document.getElementById("chargeLayer").style.display="none";
document.getElementById("iconLayer").style.display="none";
document.getElementById("newsLayer").style.display="none";
showFinal();
}

function resetToBanner(){
document.getElementById("finalLayer").style.display="none";
GAME.isRolling=false;
}

/* 가로 체크 */

function checkOrientation(){
if(window.innerHeight>window.innerWidth){
document.getElementById("rotateBlock").style.display="flex";
}else{
document.getElementById("rotateBlock").style.display="none";
}
}
window.addEventListener("resize",checkOrientation);
window.addEventListener("load",()=>{updatePreview();checkOrientation();});
</script>

</body>
</html>
