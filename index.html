<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집중 헤드헌팅</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#0f0f0f;
overflow:hidden;
font-family:Pretendard,sans-serif;
color:white;
}

/* 화면 중앙 */
.screen{
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* 16:9 */
.canvas{
position:relative;
width:100%;
max-width:1600px;
aspect-ratio:16/9;
overflow:hidden;
}

/* 배경 영상 */
.bgVideo{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* 왼쪽 블랙 베일 */
.leftShade{
position:absolute;
top:0;
left:0;
height:100%;
width:38%;
pointer-events:none;
z-index:1;
background:linear-gradient(
to right,
rgba(0,0,0,0.85) 0%,
rgba(0,0,0,0.6) 40%,
rgba(0,0,0,0.3) 65%,
rgba(0,0,0,0) 100%
);
}

/* UI 레이어 */
.uiLayer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:2;
}

/* 배너 */
.pickup{
position:absolute;
left:3%;
width:22%;
transform:skewX(-12deg);
transition:0.25s ease;
cursor:pointer;
}
.pick1{ top:12%; }
.pick2{ top:28%; }
.pick3{ top:42%; }

.pickup div{
background:#111;
border:2px solid #333;
padding:6% 8%;
font-size:1.3vw;
transform:skewX(12deg);
}

.pickup.active{
transform:skewX(-12deg) translateX(12px);
}

.pickup.active div{
border-color:#999;
box-shadow:0 0 20px rgba(255,255,255,0.4);
}

/* 가챠 버튼 */
.gacha{
position:absolute;
right:5%;
width:22%;
transform:skewX(-12deg);
cursor:pointer;
}
.gacha7{ top:36%; }
.gacha8{ top:50%; }

.gacha div{
background:#111;
border:2px solid #333;
padding:8% 6%;
text-align:center;
font-size:1.5vw;
transform:skewX(12deg);
}

/* SD 마름모 */
.bigDiamond{
position:absolute;
left:17%;
bottom:22%;
width:10%;
aspect-ratio:1/1;
background:#111;
transform:rotate(45deg);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.bigDiamond img{
width:140%;
height:140%;
object-fit:contain;
transform:rotate(-45deg);
}

/* 화살표 */
.arrow{
position:absolute;
top:50%;
font-size:2vw;
cursor:pointer;
z-index:3;
user-select:none;
}
#leftArrow{ left:42%; }
#rightArrow{ right:42%; }

/* 세로 차단 */
.rotateWarning{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f0f0f;
display:none;
align-items:center;
justify-content:center;
text-align:center;
font-size:22px;
z-index:9999;
}
</style>
</head>

<body>

<div class="screen">
<div class="canvas">

<video id="bgVideo" class="bgVideo" muted loop playsinline preload="auto">
<source src="bg1.mp4" type="video/mp4">
</video>

<div class="leftShade"></div>

<div class="uiLayer">

<div class="pickup pick1"><div>픽업 1</div></div>
<div class="pickup pick2"><div>픽업 2</div></div>
<div class="pickup pick3"><div>통상</div></div>

<div class="gacha gacha7"><div>1회 ◇130</div></div>
<div class="gacha gacha8"><div>10회 ◇1300</div></div>

<div class="bigDiamond">
  <img id="sdImage" src="">
</div>

<div id="leftArrow" class="arrow">◀</div>
<div id="rightArrow" class="arrow">▶</div>

</div>
</div>
</div>

<div id="rotateBlock" class="rotateWarning">
📱<br><br>가로 모드에서 이용해주세요.
</div>

<script>

/* =========================
   전체 캐릭터 DB (복원)
========================= */

let DB=[{name:"발렌티나",rarity:3,group:"등불사무소"},
{name:"도로시",rarity:3,group:"등불사무소"},

{name:"마리",rarity:3,group:"아스트론 학파 연구지구"},
{name:"가온",rarity:3,group:"아스트론 학파 연구지구"},
{name:"아이린",rarity:3,group:"아스트론 학파 연구지구"},
{name:"노딘",rarity:3,group:"아스트론 학파 연구지구"},
{name:"니콜라",rarity:2,group:"아스트론 학파 연구지구"},
{name:"로렌츠",rarity:2,group:"아스트론 학파 연구지구"},
{name:"프리츠",rarity:1,group:"아스트론 학파 연구지구"},
{name:"베르너",rarity:1,group:"아스트론 학파 연구지구"},
{name:"셀렌느",rarity:3,group:"하르덴브라흐"},
{name:"마커스",rarity:3,group:"하르덴브라흐"},
{name:"암젤",rarity:2,group:"하르덴브라흐"},
{name:"에밀리",rarity:1,group:"하르덴브라흐"},
{name:"안드레이",rarity:3,group:"66구역"},
{name:"드미트리",rarity:3,group:"66구역"},
{name:"공주",rarity:3,group:"66구역"},
{name:"안나",rarity:2,group:"66구역"},
{name:"모리어티",rarity:3,group:"터미널15"},
{name:"미셸",rarity:3,group:"터미널15"},
{name:"카산드라",rarity:3,group:"터미널15"},
{name:"제럴드",rarity:1,group:"터미널15"},
{name:"루핀",rarity:3,group:"볼칸 중공업"},
{name:"요루",rarity:3,group:"볼칸 중공업"},
{name:"헤더스",rarity:1,group:"볼칸 중공업"},
{name:"올리버",rarity:3,group:"찰스 브리게이드"},
{name:"오지에",rarity:3,group:"찰스 브리게이드"},
{name:"람다",rarity:3,group:"찰스 브리게이드"},
{name:"카롤",rarity:3,group:"찰스 브리게이드"},
{name:"모지",rarity:3,group:"찰스 브리게이드"},
{name:"란",rarity:3,group:"찰스 브리게이드"},
{name:"나모",rarity:2,group:"찰스 브리게이드"},
{name:"엘리아OS",rarity:3,group:"힌튼 아카이브"},
{name:"렌카",rarity:3,group:"미나모토"},
{name:"아토스",rarity:3,group:"미나모토"},
{name:"간류",rarity:3,group:"미나모토"},
{name:"레아",rarity:3,group:"미나모토"},
{name:"로건",rarity:2,group:"미나모토"},
{name:"츠카하라",rarity:1,group:"미나모토"},
{name:"랜슬롯",rarity:3,group:"아발론PMC"},
{name:"케이",rarity:3,group:"아발론PMC"},
{name:"트리스탄",rarity:3,group:"아발론PMC"},
{name:"이졸데",rarity:3,group:"아발론PMC"},
{name:"노미",rarity:3,group:"아발론PMC"},
{name:"가레스",rarity:2,group:"아발론PMC"},
{name:"이졸드",rarity:2,group:"아발론PMC"},
{name:"미래",rarity:3,group:"서천그룹"},
{name:"리",rarity:3,group:"서천그룹"},
{name:"이안",rarity:2,group:"서천그룹"},
{name:"리나",rarity:1,group:"서천그룹"},
{name:"스테파네트",rarity:3,group:"솔레어"},
{name:"뮌하우젠",rarity:2,group:"솔레어"}];

/* =========================
   배너 설정
========================= */

const BANNERS = [
{
name:"픽업 1",
preview:[
{ name:"발렌티나", video:"bg1.mp4", sd:"sd1.png" },
{ name:"할", video:"bg2.mp4", sd:"sd2.png" }
]
},
{
name:"픽업 2",
preview:[
{ name:"도로시", video:"bg3.mp4", sd:"sd3.png" },
{ name:"올가", video:"bg4.mp4", sd:"sd4.png" }
]
},
{
name:"통상",
preview:[
{ name:"통상", video:"bg5.mp4", sd:"" }
]
}
];

let currentBanner=0;
let currentIndex=0;

const video=document.getElementById("bgVideo");
const sdImage=document.getElementById("sdImage");
const leftArrow=document.getElementById("leftArrow");
const rightArrow=document.getElementById("rightArrow");

/* 배너 선택 */

document.querySelectorAll(".pickup").forEach((el,i)=>{
el.addEventListener("click",()=>{
currentBanner=i;
currentIndex=0;
document.querySelectorAll(".pickup").forEach(p=>p.classList.remove("active"));
el.classList.add("active");
updatePreview();
});
});
document.querySelectorAll(".pickup")[0].classList.add("active");

/* 프리뷰 */

function updatePreview(){
let banner=BANNERS[currentBanner];
let char=banner.preview[currentIndex];

video.src=char.video;
video.load();
video.play().catch(()=>{});

if(currentBanner===2){
sdImage.style.display="none";
leftArrow.style.display="none";
rightArrow.style.display="none";
}else{
sdImage.style.display="block";
leftArrow.style.display="block";
rightArrow.style.display="block";
sdImage.src=char.sd;
}
}

/* 화살표 */

leftArrow.onclick=()=>{
currentIndex--;
if(currentIndex<0)currentIndex=BANNERS[currentBanner].preview.length-1;
updatePreview();
};
rightArrow.onclick=()=>{
currentIndex++;
if(currentIndex>=BANNERS[currentBanner].preview.length)currentIndex=0;
updatePreview();
};

updatePreview();

/* =========================
   가챠 확률
========================= */

function rollRarity(){
let r=Math.random();
if(r<0.03)return 3;
if(r<0.23)return 2;
return 1;
}

function rollGacha(times){
let results=[];
for(let i=0;i<times;i++){
let rarity=rollRarity();
let pool=DB.filter(c=>c.rarity===rarity);

if(currentBanner!==2){
let pickupNames=BANNERS[currentBanner].preview.map(c=>c.name);
let weighted=[];
pool.forEach(c=>{
if(pickupNames.includes(c.name)){
weighted.push(c,c,c);
}
weighted.push(c);
});
pool=weighted;
}
results.push(pool[Math.floor(Math.random()*pool.length)]);
}
console.log(results);
}

/* 버튼 연결 */

document.querySelector(".gacha7").onclick=()=>rollGacha(1);
document.querySelector(".gacha8").onclick=()=>rollGacha(10);

/* 가로 체크 */

function checkOrientation(){
if(window.innerHeight>window.innerWidth){
document.getElementById("rotateBlock").style.display="flex";
}else{
document.getElementById("rotateBlock").style.display="none";
}
}
window.addEventListener("resize",checkOrientation);
window.addEventListener("load",checkOrientation);

</script>
</body>
</html>
